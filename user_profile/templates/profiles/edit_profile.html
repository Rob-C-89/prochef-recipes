{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}


{% block title %}Edit Profile{% endblock %}

{% block content %}
<h1>Edit Your Profile</h1>

<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  {{ profile_form|crispy }}
  <button type="submit">Save Changes</button>
</form>

<p><a href="{% url 'home' %}">Cancel</a></p>
{% endblock %}
