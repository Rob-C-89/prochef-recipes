{% extends 'base.html' %}
{% load static %}

{% block title %}Create Profile{% endblock %}

{% block content %}
<h1>Create Your Profile</h1>

  {{ profile_form|crispy }}

</form>

<p><a href="{% url 'home' %}">Skip for now</a></p>
{% endblock %}
