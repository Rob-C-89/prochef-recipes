{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}


{% block title %}Edit Recipe{% endblock %}

{% block content %}
<div class="container form-container">
  <div class="row">
    <div class="col-12">
      <h1 class="text-center form-heading">Edit Your Recipe</h1>
    </div>
  </div>
  
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      <form method="POST" enctype="multipart/form-data" class="generic-form">
        {% csrf_token %}
        {{ recipe_form|crispy }}
        <div class="form-actions text-center mt-4">
          <button type="submit" class="button submit-btn">Update Recipe</button>
          <a href="{% url 'home' %}" class="button cancel-btn">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
